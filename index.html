<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="漫画英雄TRPG车卡器 - 一页式竖版角色卡生成系统">
    <meta name="theme-color" content="#000000">
    <title>漫画英雄 TRPG 车卡器</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/views.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        /* 一页式专用布局补丁 */
        .one-page-app {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .sheet-container {
            background: var(--white);
            border: 4px solid var(--black);
            box-shadow: 12px 12px 0px var(--black);
            padding: 30px;
            position: relative;
            overflow: hidden;
            background-image: var(--halftone-bg);
            background-size: var(--halftone-size) var(--halftone-size);
        }

        .sheet-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: var(--halftone-dot);
            background-size: 20px 20px;
            opacity: 0.15;
            pointer-events: none;
        }

        .sheet-section {
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .controls-overlay {
            position: sticky;
            top: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border: 2px solid var(--black);
        }
    </style>
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="header-content">
                <div class="logo" id="logo" title="点击查看作者信息" style="cursor: pointer;">
                    <span class="logo-icon">🦸</span>
                    <h1>漫画英雄 <span class="subtitle">卡片锻造炉</span></h1>
                </div>
                <nav class="main-nav">
                    <button class="nav-btn active" data-view="editor" aria-label="角色编辑">
                        <span class="nav-icon">✍️</span>
                        <span class="nav-text">编辑角色</span>
                    </button>
                    <button class="nav-btn" data-view="saved" aria-label="已存角色">
                        <span class="nav-icon">📋</span>
                        <span class="nav-text">英雄名录</span>
                    </button>
                </nav>
            </div>
        </header>

        <main class="main-content one-page-app">
            <!-- 一页式角色卡编辑器 -->
            <section id="editor-view" class="view active">
                <div class="controls-overlay">
                    <div class="action-btns" style="margin-left: auto; display: flex; gap: 8px;">
                        <button class="btn btn-sm btn-info" onclick="app.creationFlow.exportAsImage()">🖼️ 导出图片</button>
                        <button class="btn btn-sm btn-success" onclick="app.creationFlow.saveCurrentCharacter()">💾
                            保存英雄</button>
                    </div>
                </div>

                <div id="character-sheet" class="sheet-container fade-in">
                    <!-- 动态生成一页式内容 -->
                    <div class="loading-state">
                        <p>正在同步英雄档案...</p>
                    </div>
                </div>
            </section>

            <!-- 已存角色名录 -->
            <section id="saved-view" class="view">
                <div class="section-header">
                    <h2>英雄名录</h2>
                    <div class="header-actions" style="display: flex; gap: 8px;">
                        <button class="btn btn-sm btn-info" id="import-image-btn">🖼️ 图片导入</button>
                        <input type="file" id="import-image-file" hidden accept="image/png">
                        <button class="btn btn-sm btn-outline" id="import-characters-btn">📥 JSON导入</button>
                        <input type="file" id="import-file-input" hidden accept=".json">
                        <button class="btn btn-sm btn-outline" id="export-all-btn">📤 备份全部</button>
                    </div>
                </div>

                <div class="filter-bar" style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <input type="text" id="search-characters" placeholder="搜索英雄..."
                        style="flex: 1; padding: 8px; border: 2px solid var(--black);">
                    <select id="sort-characters"
                        style="padding: 8px; border: 2px solid var(--black); font-weight: 900;">
                        <option value="newest">最近创建</option>
                        <option value="name">名称排序</option>
                    </select>
                </div>

                <div id="saved-characters-list" class="saved-characters-list grid-list"></div>
            </section>


        </main>

        <footer class="app-footer">
            <p>漫画英雄 TRPG 车卡器 | 一页式极简版 | 制作者：不咕鸟</p>
        </footer>
    </div>

    <!-- 模态框 & Toast 同前 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title"></h3><button class="modal-close" onclick="app.closeModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
